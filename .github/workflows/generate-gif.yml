name: Generate Terminal GIF

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      theme:
        description: 'Theme to use (default | macos | debian)'
        required: false
        default: 'default'
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-gif:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install github-readme-terminal requests python-dotenv Pillow

      - name: Generate GIF
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # Automatically injected by GitHub — scripts use this to detect the username.
          # No manual changes needed when forking.
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          # Select theme via repository variable: Settings → Secrets and variables → Actions → Variables tab → THEME
          # Valid values: default | macos | debian   (fallback: default)
          # Manual runs (workflow_dispatch) can also pass a theme via the input above.
          THEME: ${{ vars.THEME || inputs.theme || 'macos' }}
        run: |
          echo "Theme: $THEME  |  User: $GITHUB_REPOSITORY_OWNER"
          python generate_liquid_glass.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add output.gif
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update terminal GIF [skip ci]" && git pull --rebase origin main && git push)
